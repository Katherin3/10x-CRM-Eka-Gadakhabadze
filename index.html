<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In — 10X CRM</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="auth-page">

    <main class="auth-card">
        <div class="auth-brand">10X CRM</div>
        <h1>Welcome back</h1>

        <form id="login-form" novalidate>
            <div class="form-group">
                <label for="login-email">Email</label>
                <input type="text" id="login-email" placeholder="you@example.com" autocomplete="email">
            </div>

            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="Your password" autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Log In</button>
        </form>

        <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></p>
    </main>

</body>

</html>
