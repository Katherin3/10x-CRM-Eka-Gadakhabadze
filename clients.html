<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clients — 10X CRM</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/storage.js"></script>
    <script src="js/guard.js"></script>
    <script>runAuthGuard('protected');</script>
</head>

<body>

    <div class="app-layout">
        <!-- Shared navigation (P0.2) -->
        <aside class="sidebar">
            <a href="dashboard.html" class="sidebar-logo" id="nav-logo"><span class="logo-dot"></span>10X CRM</a>
            <nav class="nav-links">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="clients.html" class="nav-link active">Clients</a>
                <a href="profile.html" class="nav-link">Profile</a>
            </nav>
            <div class="sidebar-footer">
                <button id="theme-toggle" class="btn btn-ghost btn-sm">☀️ Light</button>
                <button id="logout-btn" class="btn btn-ghost btn-sm">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <!-- P4.1 — header with Add Client button (1) -->
            <div class="page-header">
                <h1>Clients</h1>
                <button id="add-client-btn" class="btn btn-primary">+ Add Client</button>
            </div>

            <!-- Toolbar: search (2), filter chips (3), sort (4) -->
            <div class="toolbar">
                <input type="text" id="search-input" class="search-input" placeholder="Search by name or company...">
                <div class="filter-chips">
                    <button class="chip active" data-status="All">All</button>
                    <button class="chip" data-status="Lead">Lead</button>
                    <button class="chip" data-status="Contacted">Contacted</button>
                    <button class="chip" data-status="Won">Won</button>
                    <button class="chip" data-status="Lost">Lost</button>
                </div>
                <select id="sort-select" class="sort-select">
                    <option value="newest">Newest first</option>
                    <option value="name">Name A→Z</option>
                    <option value="deal">Deal value: high → low</option>
                </select>
            </div>

            <!-- P4.3 — client list, rendered entirely by JS -->
            <div id="clients-list" class="clients-grid"></div>
        </main>
    </div>

    <!-- P4.4 — Add Client modal -->
    <div class="modal-overlay" id="add-modal">
        <div class="modal">
            <div class="modal-header">
                <h2>Add Client</h2>
                <button class="modal-close" id="add-modal-close" aria-label="Close">✕</button>
            </div>
            <form id="add-form" novalidate>
                <div class="form-group">
                    <label for="add-name">Name</label>
                    <input type="text" id="add-name" placeholder="Client name">
                </div>
                <div class="form-group">
                    <label for="add-email">Email</label>
                    <input type="text" id="add-email" placeholder="client@example.com">
                </div>
                <div class="form-group">
                    <label for="add-phone">Phone</label>
                    <input type="text" id="add-phone" placeholder="Phone (optional)">
                </div>
                <div class="form-group">
                    <label for="add-company">Company</label>
                    <input type="text" id="add-company" placeholder="Company (optional)">
                </div>
                <div class="form-group">
                    <label for="add-deal">Deal Value</label>
                    <input type="number" id="add-deal" placeholder="5000">
                </div>
                <div class="form-group">
                    <label for="add-status">Status</label>
                    <select id="add-status">
                        <option value="Lead" selected>Lead</option>
                        <option value="Contacted">Contacted</option>
                        <option value="Won">Won</option>
                        <option value="Lost">Lost</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Add Client</button>
            </form>
        </div>
    </div>

    <!-- P4.8 — Client details modal: info, notes, reminder -->
    <div class="modal-overlay" id="details-modal">
        <div class="modal">
            <div class="modal-header">
                <h2>Client Details</h2>
                <button class="modal-close" id="details-modal-close" aria-label="Close">✕</button>
            </div>

            <div class="details-head" id="details-head"></div>
            <div class="details-meta" id="details-meta"></div>

            <h2 style="font-size:1rem; margin-bottom:8px;">Notes</h2>
            <div class="notes-list" id="notes-list"></div>
            <div class="note-form">
                <input type="text" id="note-input" placeholder="Add a note..." class="search-input">
                <button id="add-note-btn" class="btn btn-primary btn-sm">Add note</button>
            </div>

            <button id="remind-btn" class="btn btn-ghost btn-block" style="margin-top:16px;">
                ⏰ Remind me in 1 min
            </button>
        </div>
    </div>
    <script src="js/ui.js"></script>
  <script src="js/data.js"></script>
    <script src="js/clients.js"></script>
</body>

</html>
